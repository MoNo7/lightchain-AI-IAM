<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lightchain AI | IAM Control Center</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #050608; --sidebar: #0d1117; --accent: #00f2ff;
            --text: #c9d1d9; --console-bg: #000; --border: #30363d;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar & Integrated Telemetry */
        nav { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; }
        .nav-item { padding: 12px; cursor: pointer; color: #8b949e; display: flex; align-items: center; gap: 10px; border-radius: 6px; }
        .nav-item.active { background: #161b22; color: var(--accent); }
        
        .telemetry-group { background: #161b22; border-radius: 8px; padding: 12px; margin-top: 25px; border: 1px solid var(--border); }
        .node-row { display: flex; justify-content: space-between; font-size: 0.75rem; padding: 8px 0; border-bottom: 1px solid #21262d; }
        .dot { height: 7px; width: 7px; border-radius: 50%; background: #484f58; margin-right: 6px; display: inline-block; }
        .dot.online { background: #39d353; box-shadow: 0 0 8px #39d353; }

        /* Content Area */
        .wrapper { flex: 1; display: flex; flex-direction: column; }
        header { height: 65px; background: #161b22; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }
        .stats-pill { background: #0d1117; border: 1px solid var(--border); padding: 6px 15px; border-radius: 20px; font-size: 0.8rem; }
        
        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .ticker-card { background: #0d1117; border: 1px solid var(--border); padding: 35px; border-radius: 12px; text-align: center; min-width: 320px; }

        /* System Console */
        #console { height: 150px; background: var(--console-bg); border-top: 1px solid var(--border); color: #39d353; font-family: 'Courier New', monospace; padding: 15px; overflow-y: auto; font-size: 0.85rem; }
    </style>
</head>
<body>

    <nav>
        <h2 style="color:white; font-size:1.2rem; margin-bottom:20px;">LIGHTCHAIN AI</h2>
        <div class="nav-item active"><i class="fas fa-th-large"></i> Dashboard</div>
        <div class="nav-item"><i class="fas fa-microchip"></i> Node Cluster</div>
        <div class="nav-item"><i class="fas fa-brain"></i> AIVM Registry</div>

        <div class="telemetry-group">
            <div style="font-size:0.65rem; color:#8b949e; text-transform:uppercase; margin-bottom:10px;">Network Telemetry</div>
            <div id="nodeList"></div>
        </div>
    </nav>

    <div class="wrapper">
        <header>
            <div style="display:flex; gap:15px;">
                <div class="stats-pill">LCAI: <span style="color:var(--accent)">$0.0024</span></div>
                <div class="stats-pill">ETH: <span style="color:var(--accent)">$3,842.10</span></div>
            </div>
            <button onclick="connect()" id="walletBtn" style="background:var(--accent); border:none; padding:8px 15px; border-radius:5px; font-weight:bold; cursor:pointer;">CONNECT WALLET</button>
        </header>

        <main>
            <div class="ticker-card">
                <span style="color:#8b949e; font-size:0.8rem; letter-spacing:1.5px;">INFERENCE CAPACITY</span>
                <span style="display:block; font-size:2.8rem; font-weight:bold; margin-top:10px;">1.24 <small style="font-size:1.2rem">PH/s</small></span>
            </div>
        </main>

        <div id="console">> [SYS] Initializing Sirius V2 Protocol...</div>
    </div>

    <script>
        // Restored Central Config from Commit e274030
        const CONFIG = {
            RPC_URL: "https://rpc2.siriusnet.io",
            CHAIN_ID: 504,
            CONTRACTS: {
                AIVM_REGISTRY: "0x9ca8530ca349c966fe9ef903df17a75b8a778927",
                POI_ATTESTOR: "0x2e41d0d7e8a5ec7aa7ac7a72ce69b2b79028b9c0",
                LCAI_TOKEN: "0x7a47e1b744d90660148b56afc7ce85d206289d6d"
            }
        };

        const NODES = [
            { id: "SIRIUS-ALPHA", addr: CONFIG.CONTRACTS.AIVM_REGISTRY },
            { id: "SIRIUS-BRAVO", addr: CONFIG.CONTRACTS.POI_ATTESTOR },
            { id: "SIRIUS-CHARLIE", addr: CONFIG.CONTRACTS.LCAI_TOKEN }
        ];

        async function updateTelemetry() {
            const provider = new ethers.JsonRpcProvider(CONFIG.RPC_URL);
            const list = document.getElementById('nodeList');
            let html = "";

            for(let node of NODES) {
                try {
                    const balance = await provider.getBalance(node.addr);
                    const isLive = balance > 0n;
                    html += `
                        <div class="node-row">
                            <span><div class="dot ${isLive ? 'online' : ''}"></div>${node.id}</span>
                            <span style="color:${isLive ? '#39d353' : '#8b949e'}">${isLive ? 'ACTIVE' : 'OFFLINE'}</span>
                        </div>`;
                } catch(e) { console.error(e); }
            }
            list.innerHTML = html;
        }

        async function connect() {
            if(!window.ethereum) return;
            const provider = new ethers.BrowserProvider(window.ethereum);
            const accts = await provider.send("eth_requestAccounts", []);
            document.getElementById('walletBtn').innerText = accts[0].slice(0,6) + "..." + accts[0].slice(-4);
            document.getElementById('console').innerHTML += `<br>> [AUTH] Wallet Linked: ${accts[0]}`;
        }

        updateTelemetry();
        setInterval(updateTelemetry, 20000);
    </script>
</body>
</html>
