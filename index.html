<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightchain AI | IAM Admin Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        :root { --bg: #0a0a0c; --surface: #121216; --accent: #00f2ff; --text: #e0e0e6; --border: #2a2a32; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; }
        .admin-shell { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); padding: 20px; }
        .main-content { flex: 1; padding: 40px; }
        .nav-item { padding: 12px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; color: #9494a0; }
        .nav-item.active { background: #ffffff08; color: var(--accent); }
        .glass-card { background: #ffffff05; border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
        .pill { background: var(--accent); color: #000; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: 600; }
        input { width: 100%; background: #000; border: 1px solid var(--border); padding: 12px; color: #fff; border-radius: 8px; margin-bottom: 15px; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .gallery-card { background: var(--surface); border: 1px solid var(--border); padding: 10px; border-radius: 12px; text-align: center; }
    </style>
</head>
<body>

<div class="admin-shell">
    <aside class="sidebar">
        <h2 style="color: var(--accent);">LCAI // IAM</h2>
        <div class="nav-item active" onclick="showView('zkView')">Identity</div>
        <div class="nav-item" onclick="showView('studioView')">AIVM Studio</div>
        <div class="nav-item" onclick="showView('galleryView')">Vault Gallery</div>
        <div style="margin-top: auto;">
            <button class="pill" style="width: 100%" onclick="connect()">CONNECT WALLET</button>
            <div id="walletDisplay" style="font-size: 0.7rem; margin-top: 10px; opacity: 0.5;"></div>
        </div>
    </aside>

    <main class="main-content">
        <div id="zkView" class="view-panel">
            <h1>ZK Identity</h1>
            <div id="passportContainer"><div class="glass-card">Connect to verify identity.</div></div>
        </div>

        <div id="studioView" class="view-panel" style="display:none;">
            <h1>AIVM Studio</h1>
            <div class="glass-card">
                <input type="text" id="artPrompt" placeholder="Prompt (e.g. Racoons in a race)">
                <button class="pill" onclick="generateAIVMArt()">GENERATE</button>
            </div>
            <div id="renderArea" style="text-align: center;">
                <img id="aivmOutputImage" style="max-width: 100%; border-radius: 12px; display:none;">
                <div id="renderLoader" style="display:none;">Neural weights loading...</div>
                <button id="saveArtBtn" class="pill" style="display:none; margin-top: 15px;" onclick="saveArt()">MINT TO VAULT</button>
            </div>
        </div>

        <div id="galleryView" class="view-panel" style="display:none;">
            <h1>Vault Gallery</h1>
            <div id="galleryGrid" class="gallery-grid"></div>
        </div>
    </main>
</div>

<script>
    // FIXED: Pointers restored to Raccoon-era contracts
    const CONFIG = {
        identity: "0x9A07d6a0eF4a8037318a0731E41bd4061f27B172",
        artStudio: "0xe80d9542Ef60B680a621970d209d04DB24767614",
        abi: [
            "function nicknames(address) view returns (string)",
            "function verified(address) view returns (bool)",
            "function ownerOf(uint256) view returns (address)",
            "function tokenURI(uint256) view returns (string)",
            "function mintArtNFT(string, string, string) payable"
        ]
    };

    let userWallet = "";
    let currentArtData = "";
    window.hasInitialized = false;

    async function connect() {
        if (window.ethereum) {
            const provider = new ethers.BrowserProvider(window.ethereum);
            const accounts = await provider.send("eth_requestAccounts", []);
            userWallet = accounts[0];
            document.getElementById('walletDisplay').innerText = userWallet;
            
            // FIXED: RPC Flood Guard added to the interval
            setInterval(() => {
                if(!window.hasInitialized) checkIdentity();
            }, 3000);
        }
    }

    async function checkIdentity() {
        try {
            const provider = new ethers.BrowserProvider(window.ethereum);
            const contract = new ethers.Contract(CONFIG.identity, CONFIG.abi, provider);
            const isVerified = await contract.verified(userWallet);
            const nick = await contract.nicknames(userWallet);

            if (isVerified && nick) {
                window.hasInitialized = true; // Lock the session to stop RPC errors
                renderPassport(userWallet, nick);
                loadGallery();
            }
        } catch (e) { console.warn("Syncing..."); }
    }

    function renderPassport(addr, nick) {
        const qr = qrcode(0, 'L'); qr.addData(addr); qr.make();
        document.getElementById('passportContainer').innerHTML = `
            <div class="glass-card" style="text-align:center;">
                <h2>${nick}</h2>
                <div style="background:white; display:inline-block; padding:10px; border-radius:10px;">${qr.createImgTag(4)}</div>
                <p style="font-family:monospace; margin-top:15px;">${addr}</p>
            </div>`;
    }

    async function generateAIVMArt() {
        const prompt = document.getElementById('artPrompt').value;
        document.getElementById('renderLoader').style.display = "block";
        
        // FIXED: Deprecated /p/ endpoint updated to image subdomain
        const seed = Math.floor(Math.random() * 999999);
        const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=1024&height=1024&seed=${seed}&nologo=true`;
        
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.src = url;
        img.onload = () => {
            // RESTORED: Raccoon-era 512px Compression (This made the raccoons work)
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, 512, 512);
            currentArtData = canvas.toDataURL('image/jpeg', 0.6);
            
            document.getElementById('aivmOutputImage').src = img.src;
            document.getElementById('aivmOutputImage').style.display = "block";
            document.getElementById('renderLoader').style.display = "none";
            document.getElementById('saveArtBtn').style.display = "inline-block";
        };
    }

    async function saveArt() {
        try {
            const provider = new ethers.BrowserProvider(window.ethereum);
            const signer = await provider.getSigner();
            const contract = new ethers.Contract(CONFIG.artStudio, CONFIG.abi, signer);
            const tx = await contract.mintArtNFT(currentArtData, "LCAI_RACCOON", "{}", { gasLimit: 8000000 });
            await tx.wait();
            alert("Minted successfully!");
            loadGallery();
        } catch (e) { console.error(e); alert("Minting failed. Check gas/balance."); }
    }

    async function loadGallery() {
        const grid = document.getElementById('galleryGrid');
        grid.innerHTML = "Scanning Vault...";
        try {
            const provider = new ethers.BrowserProvider(window.ethereum);
            const contract = new ethers.Contract(CONFIG.artStudio, CONFIG.abi, provider);
            let html = "";
            for(let i=0; i<25; i++) {
                try {
                    const owner = await contract.ownerOf(i);
                    if(owner.toLowerCase() === userWallet.toLowerCase()) {
                        const uri = await contract.tokenURI(i);
                        html += `<div class="gallery-card"><img src="${uri}" style="width:100%; border-radius:8px;"><p>NFT #${i}</p></div>`;
                    }
                } catch(e) { continue; }
            }
            grid.innerHTML = html || "No items found.";
        } catch(e) { console.error(grid.innerHTML = "Error loading gallery."); }
    }

    function showView(viewId) {
        document.querySelectorAll('.view-panel').forEach(v => v.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(viewId).style.display = 'block';
        event.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
