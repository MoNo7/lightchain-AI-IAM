<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lightchain AI | IAM Control Center</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.11.1/ethers.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --accent: #0070ff; --bg: #020408; --panel: #0b0e14; --border: #1e2633; --text-dim: #6a768a; --console-bg: #05070a; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        nav { width: 280px; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 25px; background: var(--panel); box-sizing: border-box; }
        .nav-logo { font-weight: 900; letter-spacing: 2px; color: var(--accent); margin-bottom: 25px; font-size: 1.1rem; text-align: center; }
        .system-console { background: var(--console-bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-family: monospace; font-size: 0.65rem; height: 180px; overflow-y: auto; margin-bottom: 20px; color: #4e5d75; line-height: 1.5; }
        .console-line { margin-bottom: 4px; border-left: 2px solid #1a202c; padding-left: 8px; }
        .console-line.success { border-left-color: var(--accent); color: #fff; }
        .console-line.error { border-left-color: #ff4444; color: #ff4444; }
        .nav-menu { display: flex; flex-direction: column; gap: 8px; }
        .nav-link { color: var(--text-dim); padding: 12px 15px; cursor: pointer; border-radius: 6px; border: none; background: rgba(255,255,255,0.03); text-align: left; font-size: 0.75rem; font-family: monospace; width: 100%; font-weight: 600; }
        .nav-link.active { color: white; background: var(--accent); }
        .viewport { flex: 1; display: flex; flex-direction: column; }
        header { height: 80px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; box-sizing: border-box; }
        .pill { background: #000; border: 1px solid var(--border); border-radius: 50px; padding: 7px 18px; font-size: 0.65rem; font-family: monospace; display: flex; align-items: center; gap: 10px; }
        .wallet-pill { background: var(--accent); color: white; border: none; padding: 9px 24px; border-radius: 50px; font-weight: 900; font-family: monospace; cursor: pointer; font-size: 0.75rem; }
        .view-pane { flex: 1; padding: 40px; display: none; overflow-y: auto; }
        .view-pane.active { display: block !important; }
        .card { background: var(--panel); border: 1px solid var(--border); padding: 30px; border-radius: 12px; border-top: 4px solid var(--accent); margin-bottom: 20px; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
        .panel-input { width: 100%; background: #000; border: 1px solid #333; color: white; padding: 12px; border-radius: 4px; font-size: 0.75rem; margin-bottom: 12px; box-sizing: border-box; font-family: monospace; }
        .action-btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 4px; font-size: 0.7rem; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 10px; }
        #gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .thumb { background: #000; padding: 10px; border-radius: 8px; border: 1px solid var(--border); text-align: center; }
        .thumb img { width: 100%; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<nav>
    <div class="nav-logo">LCAI <span>IAM</span></div>
    <div class="system-console" id="console">
        <div class="console-line">>> KERNEL_READY</div>
    </div>
    <div class="nav-menu">
        <button class="nav-link active" onclick="showView('gallery-view', this); initGallery();">NETWORK GALLERY</button>
        <button class="nav-link" onclick="showView('id-view', this); updateIdentity();">ZK IDENTITY</button>
        <button class="nav-link" onclick="showView('admin-view', this)">ADMIN PANEL</button>
        <button class="nav-link" onclick="showView('aivm-view', this)">AIVM ART GEN</button>
    </div>
</nav>

<div class="viewport">
    <header>
        <div class="pill sys" style="color:var(--accent)">
            MODEL: <span id="sys-model">AIVM-V1</span> | STATE: <span id="status-txt">ACTIVE</span>
        </div>
        <div class="pill price">
            ETH: <span id="eth-price">SYNCING...</span> | LCAI: <span id="lcai-price">SYNCING...</span>
        </div>
        <button id="wallet-btn" class="wallet-pill" onclick="connectWallet()">CONNECT WALLET</button>
    </header>

    <div id="gallery-view" class="view-pane active">
        <div class="card">
            <h2>NETWORK GALLERY</h2>
            <div id="gallery-grid"></div>
        </div>
    </div>

    <div id="id-view" class="view-pane">
        <div class="card" style="max-width: 900px;">
            <h2>ZK-SBT IDENTITY</h2>
            <div style="display:flex; gap:20px; margin-bottom:20px;">
                <pre id="id-json" style="flex:1; background:#05070a; padding:15px; font-size:0.7rem; color:var(--text-dim); border:1px solid var(--border);">// Loading Identity...</pre>
                <div id="qr-target" style="background:white; padding:10px; border-radius:8px; cursor:pointer;" onclick="downloadQR()"></div>
            </div>
            <div id="id-action-zone"></div>
        </div>
    </div>

    <div id="admin-view" class="view-pane">
        <div class="admin-grid">
            <div class="card">
                <h2>ADMINISTRATION</h2>
                <button class="action-btn" style="background:#00c853;" onclick="verifySelf()">VERIFY SELF (ART PERMISSION)</button>
                <hr style="border:0; border-top:1px solid var(--border); margin: 20px 0;">
                <textarea id="admin-target" class="panel-input" style="height:60px;" placeholder="0x... Wallet Address"></textarea>
                <button class="action-btn" onclick="batchApprove()">AUTHORIZE TARGET</button>
                <button class="action-btn" style="background:#ff4444;" onclick="resetIdentity()">FORCE RESET ID (WIPE)</button>
            </div>
            
            <div class="card" id="owner-panel" style="display:none; border-top-color:#ffaa00;">
                <h3>OWNER TREASURY</h3>
                <p style="font-size:0.8rem; color:var(--text-dim);">Contract Revenue: <br><span id="contract-rev" style="color:white; font-size: 1.5rem; font-weight: bold;">0.00</span> LCAI</p>
                <button class="action-btn" style="background:#ffaa00; margin-top: 15px;" onclick="withdrawRevenue()">WITHDRAW ALL FUNDS</button>
            </div>
        </div>
    </div>

    <div id="aivm-view" class="view-pane">
        <div class="card" style="max-width: 900px;">
            <h2>AIVM NEURAL ENGINE</h2>
            <textarea id="art-prompt" class="panel-input" style="height:80px;" placeholder="Describe your vision..."></textarea>
            <button class="action-btn" onclick="generateArt()">REQUEST INFERENCE (0.25 tLCAI)</button>
            <div id="render-box" style="margin-top:20px; text-align:center;">
                <img id="output-img" style="max-width:100%; border-radius:8px; display:none;">
            </div>
        </div>
    </div>
</div>

<script>
const CONFIG = {
    idAddr: "0xc6BE8f911a923003d53Ab64EDf557FAc4AA888ca",
    artAddr: "0xC477360020176a2D37669c328F9547c285B9fBF2",
    sbtAddr: "0xd71462F0002Ee9373fCe05B568583Ed13e75f600",
    lcaiPair: "0x0d047a370611437a1b8e6c2a95ea36f69fdda3be", // LCAI/WETH or LCAI/USDT Pair
    
    artAbi: ["function owner() view returns (address)","function manualVerified(address) view returns (bool)","function setVerification(address, bool) external","function generateArt(string, bytes32) payable external","function withdraw() external","event InferenceRequested(address indexed user, string prompt, bytes32 modelDigest)"],
    idAbi: ["function profiles(address) view returns (string username, string did, bool isVerified, bool exists)","function createProfile(string username, string did) external","function deleteProfile(address) external"],
    sbtAbi: ["function hasMinted(address) view returns (bool)","function mintSBT(address) external"]
};

let user, provider, signer, artContract, idContract, sbtContract;

const log = (msg, type = "") => {
    const cb = document.getElementById('console');
    const l = document.createElement('div');
    l.className = `console-line ${type}`;
    l.innerText = `>> ${msg}`;
    cb.appendChild(l);
    cb.scrollTop = cb.scrollHeight;
};

// LIVE PRICE ENGINE (Dexscreener + CoinGecko)
async function fetchPrices() {
    try {
        // Fetch ETH Price
        const ethRes = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=ethereum&vs_currencies=usd');
        const ethData = await ethRes.json();
        document.getElementById('eth-price').innerText = `$${ethData.ethereum.usd.toLocaleString()}`;

        // Fetch LCAI Price via Dexscreener
        const lcaiRes = await fetch(`https://api.dexscreener.com/latest/dex/pairs/ethereum/${CONFIG.lcaiPair}`);
        const lcaiData = await lcaiRes.json();
        if (lcaiData.pair) {
            document.getElementById('lcai-price').innerText = `$${parseFloat(lcaiData.pair.priceUsd).toFixed(5)}`;
        } else {
            document.getElementById('lcai-price').innerText = "$0.00198"; // Fallback
        }
    } catch (e) { console.error("Price Sync Error"); }
}

async function connectWallet() {
    let ethereumProvider = window.ethereum;
    if (window.ethereum?.providers) {
        ethereumProvider = window.ethereum.providers.find((p) => p.isMetaMask) || window.ethereum;
    }
    if (!ethereumProvider) return log("METAMASK MISSING", "error");

    try {
        const accounts = await ethereumProvider.request({ method: 'eth_requestAccounts' });
        user = accounts[0];
        provider = new ethers.BrowserProvider(ethereumProvider);
        signer = await provider.getSigner();
        
        artContract = new ethers.Contract(CONFIG.artAddr, CONFIG.artAbi, signer);
        idContract = new ethers.Contract(CONFIG.idAddr, CONFIG.idAbi, signer);
        sbtContract = new ethers.Contract(CONFIG.sbtAddr, CONFIG.sbtAbi, signer);
        
        const owner = await artContract.owner();
        if(user.toLowerCase() === owner.toLowerCase()) document.getElementById('owner-panel').style.display = 'block';

        updateBalanceDisplay();
        updateIdentity();
        initGallery();
        log("READY: " + user.slice(0,10), "success");
    } catch (e) { log("CONNECTION ERROR", "error"); }
}

async function updateBalanceDisplay() {
    const bal = await provider.getBalance(user);
    document.getElementById('wallet-btn').innerText = `${user.slice(0,6).toUpperCase()} | ${Math.floor(Number(ethers.formatEther(bal)))} LCAI`;
}

async function updateIdentity() {
    if(!user) return;
    try {
        const profile = await idContract.profiles(user);
        const hasSBT = await sbtContract.hasMinted(user);
        const meta = { "address": user, "username": profile.exists ? profile.username : "UNREGISTERED", "sbt_minted": hasSBT };
        document.getElementById('id-json').innerText = JSON.stringify(meta, null, 4);
        
        const zone = document.getElementById('id-action-zone');
        if(!profile.exists) {
            zone.innerHTML = `<input id="reg-user" class="panel-input" placeholder="Username"><button class="action-btn" onclick="registerProfile()">INITIALIZE IDENTITY</button>`;
        } else if(!hasSBT) {
            zone.innerHTML = `<button class="action-btn" style="background:#ffaa00;" onclick="mintSbtToken()">MINT LCAI-ZK0KYC SBT</button>`;
        } else {
            zone.innerHTML = `<p style="color:#00c853; font-weight:bold;">✓ LCAI-ZK IDENTITY ANCHORED</p>`;
        }
    } catch (e) { console.error(e); }
}

async function mintSbtToken() {
    try {
        log("MINTING IDENTITY TOKEN...");
        const tx = await sbtContract.mintSBT(user);
        await tx.wait();
        log("SBT MINTED", "success");
        updateIdentity();
    } catch (e) { log("MINT FAILED: Admin Only", "error"); }
}

async function resetIdentity() {
    const target = document.getElementById('admin-target').value || user;
    try {
        log("WIPING PROFILE...");
        const tx = await idContract.deleteProfile(target);
        await tx.wait();
        log("PROFILE RESET", "success");
        updateIdentity();
    } catch (e) { log("RESET FAILED", "error"); }
}

async function generateArt() {
    const prompt = document.getElementById('art-prompt').value;
    if(!prompt) return;
    try {
        log("INITIATING INFERENCE...");
        const tx = await artContract.generateArt(prompt, ethers.ZeroHash, { value: ethers.parseEther("0.25") });
        await tx.wait();
        log("RENDER SUCCESS", "success");
        document.getElementById('output-img').src = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1024&height=1024&seed=${tx.hash}&nologo=true`;
        document.getElementById('output-img').style.display = 'block';
        initGallery();
    } catch (e) { log("INFERENCE REJECTED", "error"); }
}

async function initGallery() {
    const grid = document.getElementById('gallery-grid');
    if(!artContract) return;
    try {
        const events = await artContract.queryFilter("InferenceRequested", 0, "latest");
        grid.innerHTML = "";
        events.reverse().slice(0, 12).forEach(ev => {
            const url = `https://pollinations.ai/p/${encodeURIComponent(ev.args.prompt)}?width=400&height=300&seed=${ev.transactionHash}&nologo=true`;
            grid.innerHTML += `<div class="thumb"><img src="${url}"><p style="font-size:0.6rem; color:var(--text-dim); margin-top:5px;">${ev.args.prompt}</p></div>`;
        });
    } catch (e) { grid.innerHTML = "Syncing Gallery..."; }
}

async function verifySelf() {
    try {
        log("AUTHORIZING...");
        const tx = await artContract.setVerification(user, true);
        await tx.wait();
        log("GRANTED", "success");
        updateIdentity();
    } catch (e) { log("FAILED", "error"); }
}

function showView(id, btn) {
    document.querySelectorAll('.view-pane').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-menu button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
}

window.onload = () => { fetchPrices(); connectWallet(); setInterval(fetchPrices, 30000); };
</script>
</body>
</html>
