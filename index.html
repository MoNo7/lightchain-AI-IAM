<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightchain AI | IAM Control Center</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0b10;
            --card: #141620;
            --accent: #00f2ff;
            --text: #e0e0e0;
            --dim-text: #888;
            --green: #00ffaa;
            --red: #ff4d4d;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Sidebar & Telemetry Area --- */
        nav {
            width: 260px;
            background: var(--card);
            border-right: 1px solid #2a2d3e;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .nav-header { margin-bottom: 30px; }
        .nav-header h1 { color: var(--accent); font-size: 1.1rem; margin: 0; letter-spacing: 1px; }

        .telemetry-section {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #222;
        }

        .telemetry-title { 
            font-size: 0.7rem; 
            color: var(--dim-text); 
            text-transform: uppercase; 
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
        }

        .node-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }

        .status-dot { height: 7px; width: 7px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .status-dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); }
        .status-dot.offline { background: #444; }

        /* --- Top Bar & Tickers --- */
        .main-wrapper { flex: 1; display: flex; flex-direction: column; }

        header {
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            border-bottom: 1px solid #2a2d3e;
        }

        .stats-strip { display: flex; gap: 15px; }
        .stat-pill { background: var(--card); padding: 8px 14px; border-radius: 20px; border: 1px solid #2a2d3e; font-size: 0.85rem; }
        .stat-pill span { color: var(--accent); font-weight: bold; }

        .wallet-display { background: var(--card); border: 1px solid var(--accent); color: var(--accent); padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        /* --- Main Tickers (Centered) --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .grid-tickers { display: flex; gap: 30px; }
        .ticker-card {
            background: var(--card);
            border: 1px solid #2a2d3e;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            min-width: 280px;
        }

        .ticker-label { font-size: 0.8rem; color: var(--dim-text); text-transform: uppercase; letter-spacing: 2px; }
        .ticker-val { display: block; font-size: 3rem; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-header">
            <h1>LIGHTCHAIN AI</h1>
            <small style="color: #555;">SIRIUS V2 NODE MANAGER</small>
        </div>

        <div class="telemetry-section">
            <div class="telemetry-title">
                <span>Model Telemetry</span>
                <span id="syncIndicator" style="color:var(--accent)">LIVE</span>
            </div>
            <div id="nodeList">
                </div>
        </div>
        
        <div style="margin-top: auto; font-size: 0.7rem; color: #444;">
            Chain ID: 504 (Sirius V2)
        </div>
    </nav>

    <div class="main-wrapper">
        <header>
            <div class="stats-strip">
                <div class="stat-pill">LCAI: <span id="priceLcai">$0.0024</span></div>
                <div class="stat-pill">ETH: <span id="priceEth">$3,842.10</span></div>
            </div>
            <div id="walletBtn" class="wallet-display" onclick="connectWallet()">CONNECT WALLET</div>
        </header>

        <main>
            <div class="grid-tickers">
                <div class="ticker-card">
                    <span class="ticker-label">Inference Power</span>
                    <span class="ticker-val">1.24 <small style="font-size:1.2rem; color:var(--dim-text);">PH/s</small></span>
                </div>
                <div class="ticker-card">
                    <span class="ticker-label">Network Security</span>
                    <span class="ticker-val" style="color:var(--green)">99.9%</span>
                </div>
            </div>
        </main>
    </div>

    <script>
        const SIRIUS_RPC = "https://rpc2.siriusnet.io";
        const NODES = [
            { name: "Sirius-Alpha", addr: "0x9ca8530ca349c966fe9ef903df17a75b8a778927" },
            { name: "Sirius-Bravo", addr: "0x2e41d0d7e8a5ec7aa7ac7a72ce69b2b79028b9c0" },
            { name: "Sirius-Charlie", addr: "0x7a47e1b744d90660148b56afc7ce85d206289d6d" }
        ];

        async function updateTelemetry() {
            const provider = new ethers.JsonRpcProvider(SIRIUS_RPC);
            const container = document.getElementById('nodeList');
            let html = "";

            for(const node of NODES) {
                try {
                    const balance = await provider.getBalance(node.addr);
                    const isActive = balance > 0n;
                    
                    html += `
                        <div class="node-item">
                            <span><div class="status-dot ${isActive ? 'active' : 'offline'}"></div>${node.name}</span>
                            <span style="color:${isActive ? 'var(--green)' : 'var(--dim-text)'}">${isActive ? 'ACTIVE' : 'OFFLINE'}</span>
                        </div>
                    `;
                } catch(e) {
                    console.error("RPC Error:", e);
                }
            }
            container.innerHTML = html;
        }

        async function connectWallet() {
            if (!window.ethereum) return alert("MetaMask not found");
            const provider = new ethers.BrowserProvider(window.ethereum);
            const accounts = await provider.send("eth_requestAccounts", []);
            document.getElementById('walletBtn').innerText = accounts[0].slice(0,6) + "..." + accounts[0].slice(-4);
        }

        // Real-time loop
        updateTelemetry();
        setInterval(updateTelemetry, 15000);

        // Simulated Price Update
        setInterval(() => {
            const change = (Math.random() * 0.0001 - 0.00005).toFixed(6);
            const current = parseFloat(document.getElementById('priceLcai').innerText.replace('$',''));
            document.getElementById('priceLcai').innerText = '$' + (current + parseFloat(change)).toFixed(4);
        }, 5000);
    </script>
</body>
</html>
